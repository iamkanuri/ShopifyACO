# AisleLens — Shopify app configuration.
# Deployed to the Partner app via the Shopify CLI:  shopify app deploy
#
# client_id is your app's API key (PUBLIC — not the secret; safe to commit). Either
# run `shopify app config link` (fills it in from the existing app), or paste the
# API key from Dev Dashboard → AI Visibility → Settings → Credentials.
client_id = "f3df315c44ae47b0f6e0ffd6453a965d"

name = "AisleLens"
# Embedded: the app runs inside the Shopify admin iframe. Install uses Shopify managed
# install + token exchange (POST /api/shopify/token); App Bridge supplies session tokens
# for /app/api auth. Takes effect on the next `shopify app deploy`. The classic OAuth
# redirect (/api/shopify/callback) is retained as a fallback for non-embedded access.
embedded = true
application_url = "https://lens.thirdocular.com/app"

[access_scopes]
# read_customer_events + write_pixels: AI-referral Web Pixel (Phase 10, webPixelCreate).
# write_products: Fix Studio one-click apply (Phase 6) — the ONLY store-mutating scope,
# used solely for the gated SEO title/description backfill (approval + re-read conflict
# check + snapshot/rollback + audit). copy_ready fixes are never auto-written.
# ⚠️ Adding scopes triggers merchant RE-CONSENT on the next `shopify app deploy` + reinstall.
# Keep SHOPIFY_SCOPES on the server (Railway) in sync with this.
scopes = "read_products,read_customer_events,write_pixels,write_products"

[auth]
redirect_urls = [
  "https://lens.thirdocular.com/api/shopify/callback"
]

[webhooks]
api_version = "2026-01"

  # Mandatory GDPR compliance webhooks (required for app review). Current Shopify config
  # format: a subscription with `compliance_topics` (the older `[webhooks.privacy_compliance]`
  # *_url shape is deprecated). Our single endpoint verifies HMAC, dedupes, audits, and (for
  # shop/redact) erases the shop's data.
  [[webhooks.subscriptions]]
  compliance_topics = ["customers/data_request", "customers/redact", "shop/redact"]
  uri = "https://lens.thirdocular.com/api/shopify/webhooks"
