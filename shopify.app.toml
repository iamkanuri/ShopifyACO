# AisleLens / "AI Visibility" — Shopify app configuration.
# Deployed to the Partner app via the Shopify CLI:  shopify app deploy
#
# client_id is your app's API key (PUBLIC — not the secret; safe to commit). Either
# run `shopify app config link` (fills it in from the existing app), or paste the
# API key from Dev Dashboard → AI Visibility → Settings → Credentials.
client_id = "f3df315c44ae47b0f6e0ffd6453a965d"

name = "AI Visibility"
# Non-embedded: our Phase-2 OAuth flow hosts /app on our own domain (not in an
# admin iframe). Keep false so the classic authorization-code redirect works.
embedded = false
application_url = "https://lens.thirdocular.com/app"

[access_scopes]
# Least privilege. write_products is added only for merchant-approved writes (Phase 6).
# read_customer_events + write_pixels are required to activate the AI-referral Web Pixel
# (Phase 10, webPixelCreate). ⚠️ Adding scopes triggers merchant RE-CONSENT on the next
# `shopify app deploy` + reinstall. Keep SHOPIFY_SCOPES on the server in sync with this.
scopes = "read_products,read_customer_events,write_pixels"

[auth]
redirect_urls = [
  "https://lens.thirdocular.com/api/shopify/callback"
]

[webhooks]
api_version = "2025-01"

  # Mandatory GDPR compliance webhooks (required for app review). Our single
  # endpoint verifies HMAC, dedupes, and audits each topic.
  [webhooks.privacy_compliance]
  customer_data_request_url = "https://lens.thirdocular.com/api/shopify/webhooks"
  customer_deletion_url     = "https://lens.thirdocular.com/api/shopify/webhooks"
  shop_deletion_url         = "https://lens.thirdocular.com/api/shopify/webhooks"
